spring.application.name=manyata-tech-park-finder

# H2 Database (file-based to persist across restarts)
spring.datasource.url=jdbc:h2:file:./data/manyata_companies;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (for dev debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Scheduling
spring.task.scheduling.pool.size=2

# Company refresh interval (default: 7 days in milliseconds = 604800000)
company.refresh.interval-ms=604800000

# Scraping source URL
company.scrape.url=https://techprimex.com/companies-in-manyata-tech-park/
company.scrape.timeout-ms=15000

# Job scraping config
job.scrape.timeout-ms=20000
job.refresh.interval-ms=604800000

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
